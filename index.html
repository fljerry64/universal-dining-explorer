<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Universal Orlando Menus</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    #search {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      font-size: 16px;
    }

    .restaurant {
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .menu-item {
      margin-left: 15px;
      margin-bottom: 10px;
    }

    .menu-item strong {
      display: block;
    }

    .description {
      font-size: 0.9em;
      color: #555;
    }

    .price {
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>Universal Orlando Menus</h1>

<input type="text" id="search" placeholder="Search restaurants or menu items...">

<div id="menus"></div>

<script>
let allData = [];

function renderMenus(filter = '') {
  const container = document.getElementById('menus');
  container.innerHTML = '';

  allData.forEach(rest => {

    const restaurantMatches =
      rest.name.toLowerCase().includes(filter);

    const matchingItems = rest.menu.filter(item =>
      item.item.toLowerCase().includes(filter)
    );

    if (!restaurantMatches && matchingItems.length === 0) return;

    const div = document.createElement('div');
    div.className = 'restaurant';

    const title = document.createElement('h2');
    title.innerText = rest.name;
    div.appendChild(title);

    const itemsToShow =
      restaurantMatches && filter === ''
        ? rest.menu
        : (restaurantMatches ? rest.menu : matchingItems);

    itemsToShow.forEach(item => {
      const itemDiv = document.createElement('div');
      itemDiv.className = 'menu-item';

      const name = document.createElement('strong');
      name.innerText = `${item.item} — ${item.price}`;

      const desc = document.createElement('div');
      desc.className = 'description';
      desc.innerText = item.description;

      itemDiv.appendChild(name);
      itemDiv.appendChild(desc);
      div.appendChild(itemDiv);
    });

    container.appendChild(div);
  });
}

fetch('data/menus.json')
  .then(res => res.json())
  .then(data => {
    allData = data;
    renderMenus();
  })
  .catch(err => {
    console.error("Error loading menus.json:", err);
  });

document.getElementById('search').addEventListener('input', e => {
  renderMenus(e.target.value.toLowerCase());
});
</script>

</body>
</html>
